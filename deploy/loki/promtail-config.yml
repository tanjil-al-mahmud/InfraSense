server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Static log scraping from container log files on the host
  # Avoids Docker socket API version incompatibility on Windows Docker Desktop
  - job_name: infrasense-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: infrasense
          __path__: /var/log/containers/*.log
    pipeline_stages:
      - json:
          expressions:
            event: event
            level: level
            msg: msg
      - labels:
          level:
